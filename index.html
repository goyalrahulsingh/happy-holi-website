<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi My Love!</title>
    <style>
        :root {
            --pink: #ff1493;
            --yellow: #ffd700;
            --purple: #8a2be2;
            --green: #32cd32;
            --orange: #ff4500;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #fff5f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: crosshair;
        }

        #ui-layer {
            position: absolute;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        h1 {
            color: #333;
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            opacity: 0.8;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none; /* Revealed on interaction */
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }

        /* The Pichkari (Water Gun) */
        #pichkari {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 50px;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.2s;
            user-select: none;
        }

        #pichkari:hover { transform: rotate(-15deg) scale(1.1); }

        /* Floating Balloons */
        .balloon {
            position: absolute;
            width: 50px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            animation: float 6s infinite ease-in-out;
            z-index: 5;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 22px;
            width: 2px;
            height: 20px;
            background: rgba(0,0,0,0.2);
        }

        /* Color Splats */
        .splat {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: splatAnim 0.4s forwards;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-100px) rotate(10deg); }
        }

        @keyframes splatAnim {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(4); opacity: 0.6; }
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1 id="instruction">Click the balloons or the pichkari!</h1>
        <div class="message-box" id="mainMessage">
            <h2 style="color: var(--pink);">Happy Holi, My Beautiful Wife! 🌈</h2>
            <p>May your life be as vibrant and colorful as the gulal today.</p>
            <p><strong>I love you!</strong></p>
        </div>
    </div>

    <div id="pichkari" onclick="shootWater()">🔫</div>

    <script>
        const colors = ['#ff1493', '#ffd700', '#8a2be2', '#32cd32', '#ff4500', '#00ced1'];
        let clickCount = 0;

        // Function to create balloons
        function createBalloon() {
            const balloon = document.createElement('div');
            const color = colors[Math.floor(Math.random() * colors.length)];
            balloon.className = 'balloon';
            balloon.style.left = Math.random() * 90 + 'vw';
            balloon.style.top = Math.random() * 80 + 'vh';
            balloon.style.backgroundColor = color;
            balloon.style.animationDelay = Math.random() * 2 + 's';
            
            balloon.onclick = (e) => {
                createSplat(e.pageX, e.pageY, color);
                balloon.remove();
                handleInteraction();
            };
            
            document.body.appendChild(balloon);
        }

        // Create initial balloons
        for(let i=0; i<8; i++) {
            createBalloon();
        }

        function createSplat(x, y, color) {
            const splat = document.createElement('div');
            splat.className = 'splat';
            splat.style.left = x + 'px';
            splat.style.top = y + 'px';
            splat.style.width = '30px';
            splat.style.height = '30px';
            splat.style.backgroundColor = color;
            splat.style.boxShadow = `0 0 20px ${color}`;
            document.body.appendChild(splat);
            
            // Remove splat from DOM after animation
            setTimeout(() => splat.remove(), 1000);
        }

        function shootWater() {
            const color = colors[Math.floor(Math.random() * colors.length)];
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            createSplat(x, y, color);
            handleInteraction();
        }

        function handleInteraction() {
            clickCount++;
            if (clickCount >= 3) {
                document.getElementById('instruction').style.display = 'none';
                document.getElementById('mainMessage').style.display = 'block';
            }
            // Keep adding more balloons as she pops them
            if (document.querySelectorAll('.balloon').length < 5) {
                createBalloon();
            }
        }
    </script>
</body>
</html>

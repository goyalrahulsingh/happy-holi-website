<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi, My Love!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #ff6f61, #ffb74d, #ffd54f, #4caf50);
            background-size: 400% 400%;
            animation: gradientAnimation 5s ease infinite;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 3em;
            animation: slideIn 3s ease-out;
        }

        p {
            font-size: 1.5em;
            margin-top: 20px;
            opacity: 0.9;
        }

        .message {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
        }

        .confetti {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url('https://cdn.pixabay.com/photo/2017/11/17/09/43/confetti-2954231_960_720.png');
            background-size: cover;
            animation: confettiFall 1s ease-out infinite;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes confettiFall {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }

    </style>
</head>
<body>
    <div class="confetti"></div>
    <div class="message">
        <h1>Happy Holi, My Love! 🌈💖</h1>
        <p>On this beautiful festival of colors, I just want to say that you color my world with love, joy, and happiness every single day. Wishing you all the colors of happiness today and forever!</p>
    </div>
</body>
</html>

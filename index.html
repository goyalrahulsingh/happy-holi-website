<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi, My Love!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #ff6f61, #ffb74d, #ffd54f, #4caf50);
            background-size: 400% 400%;
            animation: gradientAnimation 5s ease infinite;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        h1 {
            font-size: 3em;
            animation: slideIn 3s ease-out;
        }

        p {
            font-size: 1.5em;
            margin-top: 20px;
            opacity: 0.9;
        }

        .message {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            display: none;
        }

        .confetti {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url('https://cdn.pixabay.com/photo/2017/11/17/09/43/confetti-2954231_960_720.png');
            background-size: cover;
            animation: confettiFall 1s ease-out infinite;
        }

        .holi-items {
            margin-top: 50px;
        }

        .holi-item {
            display: inline-block;
            margin: 20px;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }

        .holi-item:hover {
            transform: scale(1.2);
        }

        .balloon, .pichkari {
            width: 100px;
            height: 100px;
            background-color: #ffcc00;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            color: white;
        }

        .pichkari {
            width: 120px;
            height: 50px;
            background-color: #ff4081;
            border-radius: 10px;
        }

        .message h2 {
            font-size: 2em;
            color: #ffeb3b;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes confettiFall {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>
<body>
    <div class="confetti"></div>
    <div class="message">
        <h1>Happy Holi, Gullu! 🌈💖</h1>
        <p>On this beautiful festival of colors, I just want to say that you color my world with love, joy, and happiness every single day. Thank you for being the brightest part of my life. Wishing you all the colors of happiness today and forever!</p>
        <div class="holi-items">
            <div class="holi-item balloon" onclick="showMessage('balloon')">🎈</div>
            <div class="holi-item pichkari" onclick="showMessage('pichkari')">💦</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            function showMessage(item) {
                let messageDiv = document.querySelector('.message');
                let messageContent = '';
                
                if (item === 'balloon') {
                    messageContent = `
                        <h2>Colorful Love & Joy!</h2>
                        <p>Just like the balloons we pop together, every moment with you is filled with laughter and joy. 💕 Wishing you a Holi filled with light and love, my dearest!</p>
                    `;
                } else if (item === 'pichkari') {
                    messageContent = `
                        <h2>Spray of Love!</h2>
                        <p>Like the splash of water from the pichkari, you shower my life with vibrant love. 💖 I hope your Holi is as fun, colorful, and joyful as our time together!</p>
                    `;
                }
    
                // Update message and show it
                messageDiv.innerHTML = messageContent;
                messageDiv.style.display = 'block';
            }
    
            // Assign the function to the clickable elements
            const balloon = document.querySelector('.balloon');
            const pichkari = document.querySelector('.pichkari');
    
            if (balloon) balloon.addEventListener('click', function() {
                showMessage('balloon');
            });
    
            if (pichkari) pichkari.addEventListener('click', function() {
                showMessage('pichkari');
            });
        });
    </script>
</body>
</html>
